name: Publish to crates.io

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Publish in dependency order with delays for index updates
          publish() {
            local crate="$1"
            local attempts=0
            while true; do
              attempts=$((attempts + 1))
              echo "Publishing ${crate} (attempt ${attempts})..."
              local output
              if output=$(cargo publish -p "${crate}" 2>&1); then
                echo "  Published ${crate}, waiting for index update..."
                sleep 65
                return 0
              elif echo "${output}" | grep -q "already exists"; then
                echo "  ${crate} already published, skipping"
                return 0
              elif echo "${output}" | grep -q "429\|Too Many Requests"; then
                if [ "${attempts}" -ge 5 ]; then
                  echo "${output}" >&2
                  return 1
                fi
                echo "  Rate limited, waiting 65 seconds before retry..."
                sleep 65
              else
                echo "${output}" >&2
                return 1
              fi
            done
          }

          # Tier 0: Foundation
          publish lexicon-spec

          # Tier 1: Depend only on spec
          publish lexicon-fs
          publish lexicon-audit

          # Tier 2: Mid-level crates
          publish lexicon-repo
          publish lexicon-scoring
          publish lexicon-api
          publish lexicon-coverage

          # Tier 3: Higher-level crates
          publish lexicon-conformance
          publish lexicon-gates
          publish lexicon-conversation

          # Tier 4: Near-top crates
          publish lexicon-scaffold
          publish lexicon-ai
          publish lexicon-tui

          # Tier 5: Orchestrator
          publish lexicon-core

          # Tier 6: CLI binary
          echo "Publishing lexicon-rs..."
          cargo publish -p lexicon-rs
